baseURL = "https://bakhtiararifinid.github.io/"
locale = "en-us"
title = "Bakhtiar Arifin"
theme = "PaperMod"

[pagination]
  pagerSize = 5

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "Personal blog of Bakhtiar Arifin"
  author = "Bakhtiar Arifin"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.assets]
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"
    apple_touch_icon = "/favicon.svg"
    safari_pinned_tab = "/favicon.svg"

  [params.profileMode]
    enabled = true
    title = "Bakhtiar Arifin"
    subtitle = "I write about software, projects, and things I'm learning."
    imageUrl = "/images/profile.svg"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Bakhtiar Arifin"
    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags/"
    [[params.profileMode.buttons]]
      name = "About"
      url = "/about/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/bakhtiararifinid"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:bakhtiararifinid@gmail.com"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40
